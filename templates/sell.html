{% extends "base.html" %}

{% block title %}Sell/Donate - E-Waste Management{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-plus"></i> Sell or Donate Item</h1>
</div>

<div class="form-container">
    <form method="POST" class="sell-form">
        <div class="form-row">
            <div class="form-group">
                <label>Item Name *</label>
                <input type="text" name="title" required>
            </div>
            <div class="form-group">
                <label>Category *</label>
                <select name="category" required>
                    <option value="">Select Category</option>
                    <option value="Laptop">Laptop</option>
                    <option value="Mobile">Mobile</option>
                    <option value="Tablet">Tablet</option>
                    <option value="Monitor">Monitor</option>
                    <option value="Keyboard">Keyboard</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label>Description *</label>
            <textarea name="description" rows="4" required></textarea>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Condition *</label>
                <select name="condition" required>
                    <option value="">Select Condition</option>
                    <option value="New">New</option>
                    <option value="Used">Used</option>
                    <option value="Repairable">Repairable</option>
                </select>
            </div>
            <div class="form-group">
                <label>Price (leave empty for donation)</label>
                <input type="number" name="price" step="0.01" min="0">
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary btn-large">
            <i class="fas fa-paper-plane"></i> List Item
        </button>
    </form>
</div>
{% endblock %}
