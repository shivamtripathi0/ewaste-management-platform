<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}E-Waste Management{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    {% if session.user_id %}
    <!-- Navbar for logged-in users -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="{{ url_for('selection') }}" class="nav-logo-text">E-Waste</a>
            </div>
            <div class="nav-search">
                <input type="text" id="searchInput" placeholder="Search items..." onkeyup="searchItems()">
                <i class="fas fa-search"></i>
            </div>
            <div class="nav-menu">
                <a href="{{ url_for('buy') }}" class="nav-link">
                    <i class="fas fa-shopping-cart"></i> Buy
                </a>
                <a href="{{ url_for('sell') }}" class="nav-link">
                    <i class="fas fa-plus"></i> Sell
                </a>
                <a href="{{ url_for('profile') }}" class="nav-link">
                    <i class="fas fa-user"></i> Profile
                </a>
                <a href="{{ url_for('logout') }}" class="nav-link logout">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="main-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'success' if category == 'success' else 'error' }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
